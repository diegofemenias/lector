<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Lector</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/admin.css" />
</head>
<body class="admin-page">
  <header class="header">
    <div class="logo">🛠️ Admin Lector</div>
    <a class="btn btn-small btn-ghost" href="/">Volver a la app</a>
  </header>
  <main class="container">
    <section id="admin-app" class="card admin-card"></section>
  </main>
  <script type="module">
    const root = document.getElementById("admin-app");
    let currentUserId = null;

    async function api(path, options = {}) {
      const res = await fetch(path, {
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Error");
      return data;
    }

    function esc(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escAttr(s) {
      return esc(s).replaceAll("'", "&#39;");
    }

    async function renderLoginForm() {
      root.innerHTML = `
        <h2>Panel de administración</h2>
        <p class="subtitle">Primero ingresá con Google en la app principal. Luego usá la contraseña de admin.</p>
        <form id="admin-login" class="stack" style="max-width:360px">
          <input class="input" type="password" name="password" placeholder="Contraseña admin" required />
          <button class="btn btn-primary" type="submit">Entrar</button>
        </form>
      `;
      document.getElementById("admin-login").addEventListener("submit", async (e) => {
        e.preventDefault();
        const password = new FormData(e.target).get("password");
        try {
          await api("/api/admin/login", { method: "POST", body: JSON.stringify({ password }) });
          await renderDashboard();
        } catch (err) {
          alert(err.message);
        }
      });
    }

    function renderParticipantsTable(users) {
      if (!users.length) {
        return "<p class='subtitle'>No hay participantes registrados.</p>";
      }

      return `
        <table class="participants-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Email</th>
              <th>Puntos</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            ${users
              .map((u) => {
                const isSelf = u.id === currentUserId;
                const adminTag = u.isAdmin ? '<span class="admin-badge">admin</span>' : "";
                const nameValue = u.displayName || "";
                return `
              <tr data-user-id="${escAttr(u.id)}">
                <td data-label="Nombre">
                  <input
                    class="name-input"
                    type="text"
                    maxlength="40"
                    value="${escAttr(nameValue)}"
                    placeholder="Sin nombre"
                    data-field="displayName"
                  />
                  ${adminTag}
                </td>
                <td data-label="Email">${esc(u.email)}</td>
                <td data-label="Puntos">${u.pointsTotal}</td>
                <td data-label="Acciones">
                  <div class="participant-actions">
                    <button type="button" class="btn btn-small btn-primary" data-action="save-name">Guardar</button>
                    <button
                      type="button"
                      class="btn btn-small btn-ghost"
                      data-action="delete-user"
                      ${isSelf ? "disabled title='No podés eliminar tu propia cuenta'" : ""}
                    >Eliminar</button>
                  </div>
                </td>
              </tr>`;
              })
              .join("")}
          </tbody>
        </table>
      `;
    }

    function bindParticipantActions() {
      root.querySelectorAll("[data-action='save-name']").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const row = btn.closest("tr");
          const userId = row.dataset.userId;
          const input = row.querySelector("[data-field='displayName']");
          const displayName = input.value.trim();
          if (displayName.length < 2) {
            alert("El nombre debe tener al menos 2 caracteres.");
            return;
          }
          try {
            btn.disabled = true;
            await api(`/api/admin/users/${userId}`, {
              method: "PATCH",
              body: JSON.stringify({ displayName }),
            });
            await renderDashboard();
          } catch (err) {
            alert(err.message);
          } finally {
            btn.disabled = false;
          }
        });
      });

      root.querySelectorAll("[data-action='delete-user']").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const row = btn.closest("tr");
          const userId = row.dataset.userId;
          const input = row.querySelector("[data-field='displayName']");
          const label = input.value.trim() || row.querySelector("td[data-label='Email']")?.textContent || "este participante";
          if (!confirm(`¿Eliminar a ${label}? Se borrarán sus puntos e intentos.`)) return;
          try {
            btn.disabled = true;
            await api(`/api/admin/users/${userId}`, { method: "DELETE" });
            await renderDashboard();
          } catch (err) {
            alert(err.message);
            btn.disabled = false;
          }
        });
      });
    }

    async function renderDashboard() {
      try {
        const [stats, usersData] = await Promise.all([
          api("/api/admin/stats"),
          api("/api/admin/users"),
        ]);

        root.innerHTML = `
          <h2>Estadísticas</h2>
          <div class="admin-grid">
            <div class="stat-box"><strong>${stats.totalUsers}</strong>Usuarios</div>
            <div class="stat-box"><strong>${stats.totalStories}</strong>Cuentos</div>
            <div class="stat-box"><strong>${stats.totalAttempts}</strong>Intentos</div>
            <div class="stat-box"><strong>${stats.totalPoints}</strong>Puntos totales</div>
          </div>

          <h3 class="admin-section-title">Participantes</h3>
          <p class="subtitle">Editá el nombre o eliminá participantes. Al eliminar se borran sus puntos e historial.</p>
          ${renderParticipantsTable(usersData.users)}

          <h3 class="admin-section-title">Actividad reciente</h3>
          <table class="activity-table">
            <thead><tr><th>Lector</th><th>Email</th><th>Cuento</th><th>Puntos</th><th>Fecha</th></tr></thead>
            <tbody>
              ${stats.recentActivity.map((a) => `
                <tr>
                  <td>${esc(a.display_name || "—")}</td>
                  <td>${esc(a.email)}</td>
                  <td>${esc(a.title)}</td>
                  <td>${a.points}</td>
                  <td>${esc(a.completed_at)}</td>
                </tr>`).join("") || "<tr><td colspan='5'>Sin actividad aún</td></tr>"}
            </tbody>
          </table>
        `;

        bindParticipantActions();
      } catch {
        await renderLoginForm();
      }
    }

    const me = await api("/api/me");
    if (!me.authenticated) {
      root.innerHTML = `<p class="subtitle">Necesitás <a href="/auth/google">ingresar con Google</a> primero.</p>`;
    } else {
      currentUserId = me.user.id;
      if (me.user.isAdmin) {
        await renderDashboard();
      } else {
        await renderLoginForm();
      }
    }
  </script>
</body>
</html>
