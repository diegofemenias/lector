<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Lectores — Aventuras de lectura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@400;700&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@400;700&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@400;700&display=swap"
    />
  </noscript>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-shapes" aria-hidden="true">
    <span class="shape shape-1"></span>
    <span class="shape shape-2"></span>
    <span class="shape shape-3"></span>
  </div>

  <header class="header">
    <button type="button" class="logo" data-action="home">📚 Mini Lectores</button>
    <button
      id="nav-toggle"
      class="nav-toggle hidden"
      type="button"
      aria-label="Abrir menú"
      aria-expanded="false"
      aria-controls="nav"
    >
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>
    <nav id="nav" class="nav hidden" aria-label="Menú principal"></nav>
  </header>

  <main id="app" class="container">
    <section class="card card--instant stack login-card" id="login-shell" aria-label="Inicio de sesión">
      <h1 class="hero-title hero-title-landing">¡A leer se ha dicho!</h1>
      <div class="login-actions">
        <a class="btn btn-google btn-google-hero" href="/auth/google">🔐 Entrar con Google</a>
      </div>
      <p class="login-promo-text">
        <span class="promo-word promo-read">Lee cuentos cortos</span>,
        <span class="promo-word promo-quiz">responde preguntas</span> y
        <span class="promo-word promo-rank">subí en el ranking</span>.
      </p>
    </section>
  </main>

  <script src="/app.js" type="module"></script>
</body>
</html>
